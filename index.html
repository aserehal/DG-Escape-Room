function loadG(){

}
function saveG(g){
  try{localStorage.setItem(KEY,JSON.stringify(g));
    try{new BroadcastChannel(KEY).postMessage('update');}catch{}

  catch{return false;}
}

function getRem(g){
  const e=(g.timerElapsed||0)+(g.timerOn&&g.timerTs?(Date.now()-g.timerTs)/1000:0);
  return Math.max(0,MSECS-e);
}
function fmt(s){s=Math.floor(s);return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}

function useTimer(g){
  const[s,setS]=useState(()=>getRem(g));
  const ref=useRef(g);ref.current=g;
  useEffect(()=>{
    setS(getRem(ref.current));
    if(!g.timerOn)return;
    const t=setInterval(()=>setS(getRem(ref.current)),1000);
    return()=>clearInterval(t);
  },[g.timerOn,g.timerTs,g.timerElapsed]);
  return s;
}

        </div>
      </div>
      <div style={{borderBottom:'1px solid rgba(255,255,255,.08)',padding:'0 20px',display:'flex',gap:2,background:'#020617',overflowX:'auto'}}>
        {[['control','⚙️ Control'],['crises','🚨 Crises'],['scoring','🏆 Scoring'],['playbook','🎓 Playbook']].map(([id,lbl])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:'12px 16px',background:'none',border:'none',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit',color:tab===id?'#f1f5f9':'#475569',borderBottom:`2px solid ${tab===id?'#10b981':'transparent'}`,marginBottom:-1,whiteSpace:'nowrap',transition:'.15s'}}>{lbl}</button>
        ))}
      </div>
      <div style={{maxWidth:1100,margin:'0 auto',padding:'24px 20px',display:'flex',flexDirection:'column',gap:20}}>

        {tab==='control'&&(<>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))',gap:16}}>
            <div className="card">
              <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:14,textTransform:'uppercase',letterSpacing:1}}>⏱ Mission Timer</div>
              <div style={{fontFamily:'monospace',fontWeight:800,fontSize:52,color:urg?'#f43f5e':'#f1f5f9',lineHeight:1}}>{fmt(secs)}</div>
              <div style={{display:'flex',gap:8,marginTop:16}}>
                {!game.timerOn
                  ?<button onClick={startT} className="btn btn-g" style={{flex:1,justifyContent:'center',fontSize:15}}>▶ Start</button>
                  :<button onClick={pauseT} className="btn" style={{flex:1,justifyContent:'center',fontSize:15,background:'rgba(245,158,11,.15)',color:'#fcd34d',border:'1px solid rgba(245,158,11,.3)'}}>⏸ Pause</button>}
                <button onClick={resetT} className="btn btn-gh" style={{padding:'10px 16px',fontSize:16}}>↺</button>
              </div>
            </div>
            <div className="card">
              <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:14,textTransform:'uppercase',letterSpacing:1}}>🚨 Crisis Progress</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {PHASES.map((p,i)=>{const lk=i>u,done=game.completed?.[i],cur=i===u;return(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:26,height:26,borderRadius:7,background:done?'rgba(16,185,129,.2)':cur?'rgba(245,158,11,.2)':'rgba(255,255,255,.05)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:done?'#6ee7b7':cur?'#fcd34d':'#334155',flexShrink:0}}>{i+1}</div>
                    <div style={{fontSize:12,flex:1,color:lk?'#1e293b':cur?'#f1f5f9':'#475569'}}>Crisis {i+1}</div>
                    {lk?<button onClick={()=>unlockAt(i)} style={{background:'none',border:'none',color:'#3b82f6',fontSize:11,cursor:'pointer',padding:0,fontWeight:600,fontFamily:'inherit'}}>unlock</button>:done?<span style={{color:'#10b981'}}>✓</span>:<span className="tag tag-a" style={{fontSize:10,padding:'2px 8px'}}>Active</span>}
                  </div>
                );})}
              </div>
              {u<PHASES.length-1&&<button onClick={unlockNext} className="btn btn-w" style={{width:'100%',justifyContent:'center',marginTop:14}}>🔓 Unlock Crisis {u+2}</button>}
            </div>
            <div className="card">
              <div style={{fontSize:11,color:'#64748b',fontWeight:700,marginBottom:14,textTransform:'uppercase',letterSpacing:1}}>👥 Connected Teams ({teams.length})</div>
              {teams.length===0
                ?<div style={{textAlign:'center',padding:'20px 0',color:'#1e293b',fontSize:13}}><div style={{fontSize:32,marginBottom:8}}>👥</div>Students join by opening this file and entering a team name.</div>
                :<div style={{display:'flex',flexDirection:'column',gap:7}}>
                  {teams.map((t,i)=>(
                    <div key={i} style={{display:'flex',alignItems:'center',gap:10,background:'rgba(255,255,255,.04)',borderRadius:12,padding:'9px 14px'}}>
                      <div style={{width:30,height:30,borderRadius:8,background:'rgba(16,185,129,.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'#6ee7b7',flexShrink:0}}>{t.charAt(0).toUpperCase()}</div>
                      <span style={{fontSize:13,flex:1}}>{t}</span>
                      <span style={{fontSize:12,color:'#6ee7b7',background:'rgba(16,185,129,.1)',padding:'3px 10px',borderRadius:999,fontWeight:600}}>{Object.values(sc[t]||{}).reduce((s,v)=>s+Number(v||0),0)} pts</span>
                    </div>
                  ))}
                </div>
              }
              <button onClick={resetAll} style={{marginTop:14,width:'100%',background:'rgba(244,63,94,.08)',border:'1px solid rgba(244,63,94,.2)',borderRadius:12,padding:10,color:'#fda4af',fontSize:12,cursor:'pointer',fontWeight:600,fontFamily:'inherit'}}>🗑 Reset Entire Game</button>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
            {[['👥','Teams Playing',teams.length,'#10b981'],['🚨','Active Crisis',`#${u+1}`,'#f59e0b'],['✅','Crises Complete',`${dn}/6`,'#3b82f6'],['🏆','Max Score','100 pts','#8b5cf6']].map(([ic,l,v,c],i)=>(
              <div key={i} className="card" style={{display:'flex',alignItems:'center',gap:14}}><span style={{fontSize:22}}>{ic}</span><div><div style={{fontSize:24,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:11,color:'#475569',marginTop:2}}>{l}</div></div></div>
            ))}
          </div>
        </>)}

        {tab==='crises'&&(
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(400px,1fr))',gap:16}}>
            {PHASES.map((p,i)=>(
              <CrisisCard key={i} p={p} locked={i>u} showAns={showAns&&i<=u} instructor isLastUnlocked={i===u&&u<PHASES.length-1} onUnlockNext={unlockNext}/>
            ))}
          </div>
        )}

        {tab==='scoring'&&(
          <div style={{display:'grid',gridTemplateColumns:'1.4fr .6fr',gap:18}}>
            <div className="card">
              <h2 style={{fontSize:17,fontWeight:700,marginBottom:18}}>Team Scores — Enter 0 to 20 per category</h2>
              {teams.length===0
                ?<div style={{textAlign:'center',padding:40,color:'#1e293b'}}><div style={{fontSize:36,marginBottom:10}}>🏆</div>No teams have joined yet.</div>
                :<div style={{overflowX:'auto'}}>
                  <table style={{width:'100%',fontSize:13,borderCollapse:'collapse',minWidth:500}}>
                    <thead><tr style={{borderBottom:'1px solid rgba(255,255,255,.08)'}}>
                      <th style={{padding:'8px 8px 12px 0',textAlign:'left',color:'#64748b',fontWeight:600}}>Team</th>
                      {RUB.map(r=><th key={r.k} style={{padding:'8px 4px 12px',textAlign:'center',color:'#64748b',fontWeight:600,fontSize:11}}>{r.l}</th>)}
                      <th style={{padding:'8px 0 12px 8px',textAlign:'right',color:'#64748b',fontWeight:600}}>Total</th>
                    </tr></thead>
                    <tbody>{teams.map(t=>{const s=sc[t]||{},tot=Object.values(s).reduce((x,v)=>x+Number(v||0),0);return(
                      <tr key={t} style={{borderBottom:'1px solid rgba(255,255,255,.05)'}}>
                        <td style={{padding:'10px 8px 10px 0',fontWeight:600,fontSize:14}}>{t}</td>
                        {RUB.map(r=><td key={r.k} style={{padding:'8px 4px',textAlign:'center'}}><input type="number" min="0" max="20" value={s[r.k]??0} onChange={e=>updSc(t,r.k,e.target.value)}/></td>)}
                        <td style={{padding:'10px 0 10px 8px',textAlign:'right',fontWeight:800,fontSize:20}}>{tot}</td>
                      </tr>
                    );})}</tbody>
                  </table>
                </div>
              }
            </div>
            <div className="card" style={{background:'#060d1a'}}>
              <div style={{fontSize:11,color:'#fcd34d',fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:16}}>🏆 Live Leaderboard</div>
              {lb.length===0
                ?<p style={{color:'#1e293b',fontSize:13,textAlign:'center',padding:28}}>Teams appear after joining.</p>
                :<div style={{display:'flex',flexDirection:'column',gap:10}}>
                  {lb.map(({t,total},i)=>(
                    <div key={t} style={{background:i===0?'rgba(245,158,11,.1)':'rgba(255,255,255,.04)',border:`1px solid ${i===0?'rgba(245,158,11,.25)':'rgba(255,255,255,.06)'}`,borderRadius:14,padding:'14px 16px',display:'flex',alignItems:'center',gap:12}}>
                      <div style={{width:34,height:34,borderRadius:10,background:i===0?'#f59e0b':'rgba(255,255,255,.08)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:i===0?16:13,fontWeight:700,color:i===0?'#0f172a':'#475569',flexShrink:0}}>{i===0?'🥇':`#${i+1}`}</div>
                      <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15}}>{t}</div><div style={{fontSize:11,color:'#334155',marginTop:2}}>{i===0?'Currently leading':'In competition'}</div></div>
                      <div style={{fontSize:28,fontWeight:800}}>{total}</div>
                    </div>
                  ))}
                </div>
              }
              <div style={{marginTop:18,paddingTop:16,borderTop:'1px solid rgba(255,255,255,.08)'}}>
                <div style={{fontSize:10,color:'#334155',fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:10}}>Rubric (20 pts each)</div>
                {RUB.map(r=><div key={r.k} style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:5}}><span style={{color:'#475569'}}>{r.l}</span><span style={{color:'#334155'}}>20 pts</span></div>)}
                <div style={{borderTop:'1px solid rgba(255,255,255,.06)',marginTop:8,paddingTop:8,display:'flex',justifyContent:'space-between',fontWeight:700,fontSize:13}}><span>Total</span><span>100 pts</span></div>
              </div>
            </div>
          </div>
        )}

        {tab==='playbook'&&(<>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <div className="card">
              <h3 style={{fontWeight:700,marginBottom:14,fontSize:15}}>Learning Objectives</h3>
              {["Diagnose what can go wrong during a DG implementation.","Apply DG lifecycle thinking to an urgent enterprise problem.","Balance scope, ownership, controls, metrics, and change management.","Connect governance to AI trust, privacy, and executive decision-making."].map((o,i)=><div key={i} style={{display:'flex',gap:8,fontSize:13,color:'#94a3b8',marginBottom:8,lineHeight:1.5}}><span style={{color:'#10b981',flexShrink:0}}>✓</span>{o}</div>)}
            </div>
            <div className="card">
              <h3 style={{fontWeight:700,marginBottom:14,fontSize:15}}>How to Run It</h3>
              {["Everyone opens the same HTML file — students click 'I'm a Student', you click 'I'm an Instructor'.","Read the opening story dramatically before starting the timer.","Use Game Control to start the timer and unlock crises one by one.","Enter team scores in the Scoring tab at the end of each crisis."].map((o,i)=><div key={i} style={{display:'flex',gap:8,fontSize:13,color:'#94a3b8',marginBottom:8,lineHeight:1.5}}><span style={{color:'#3b82f6',fontWeight:700,flexShrink:0}}>{i+1}.</span>{o}</div>)}
            </div>
          </div>
          <div className="card">
            <h3 style={{fontWeight:700,marginBottom:16,fontSize:15}}>Run of Show</h3>
            <table style={{width:'100%',fontSize:13,borderCollapse:'collapse'}}>
              <thead><tr style={{borderBottom:'1px solid rgba(255,255,255,.08)'}}>{['Time','Activity','Instructor Note'].map(h=><th key={h} style={{padding:'6px 10px 12px',textAlign:'left',color:'#64748b',fontWeight:600}}>{h}</th>)}</tr></thead>
              <tbody>{[['5 min','Open the scenario','Read dramatically — create urgency from the start'],['12–15 min','Crisis 1','Force them to keep the scope small; reject "all enterprise data"'],['10–12 min','Crisis 2','Push executive resistance hard — act out the CFO role if needed'],['15 min','Crisis 3','Require clear role distinctions, not vague ownership statements'],['10–12 min','Crisis 4','Challenge overly broad rollout plans; demand specific milestones'],['12–15 min','Crisis 5','Reject vanity metrics — ask "what action does this trigger?"'],['12–15 min','Crisis 6','Ask how governance survives when the champion leaves'],['5–10 min','Debrief','Map their decisions back to your DG lecture framework']].map((r,i)=>(
                <tr key={i} style={{borderBottom:'1px solid rgba(255,255,255,.04)'}}>{r.map((c,j)=><td key={j} style={{padding:'9px 10px',color:j===0?'#64748b':j===1?'#f1f5f9':'#475569',lineHeight:1.4}}>{c}</td>)}</tr>
              ))}</tbody>
            </table>
          </div>
          <div style={{background:'#060d1a',border:'1px solid rgba(255,255,255,.07)',borderRadius:20,padding:24}}>
            <div style={{fontSize:10,color:'#6ee7b7',fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>📢 Opening Story Script — Read This Aloud</div>
            <p style={{fontSize:14,color:'#cbd5e1',lineHeight:1.8,marginBottom:12}}>"It is 7:00 PM. NovaRetail is scheduled to launch a $40 million AI platform tomorrow morning. The platform is supposed to personalize customer experiences, optimize marketing campaigns, and improve retention. But during final testing, everything started to break. Different systems returned different customer counts. Sensitive customer information was found in analytics datasets without proper classification. The AI team cannot explain where key training data came from or who owns it."</p>
            <p style={{fontSize:14,color:'#cbd5e1',lineHeight:1.8}}>"The CEO has frozen the launch. You are now the Emergency Data Governance Task Force. Your mission is to design a credible governance implementation before the board reconvenes. You have 90 minutes. <strong style={{color:'#f1f5f9'}}>Begin.</strong>"</p>
          </div>
        </>)}
      </div>
    </div>
  );
}

function App(){
  const[role,setRole]=useState(null);
  const[team,setTeam]=useState('');
  const[game,setGame]=useState(()=>loadG());
  const load=useCallback(()=>{const g=loadG();setGame(g);return g;},[]);
  const save=useCallback(g=>{saveG(g);setGame(g);},[]);

  useEffect(()=>{
    const t=setInterval(load,POLL);
    let bc;
    try{bc=new BroadcastChannel(KEY);bc.onmessage=()=>load();}catch{}
    return()=>{clearInterval(t);try{bc&&bc.close();}catch{}}
  },[load]);

  const join=name=>{
    const g=loadG();const ts=g.teams||[];
    const ng=ts.includes(name)?g:{...g,teams:[...ts,name],scores:{...g.scores,[name]:g.scores?.[name]||{ProblemFraming:0,Practicality:0,Alignment:0,BusinessReasoning:0,TeamPresentation:0}}};
    save(ng);setTeam(name);setRole('student');
  };

  if(!role)return <Login onI={()=>setRole('instructor')} onS={join}/>;
  if(role==='student')return <StudentView game={game} team={team} onOut={()=>setRole(null)}/>;
  return <InstructorView game={game} onSave={save} onOut={()=>setRole(null)}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
